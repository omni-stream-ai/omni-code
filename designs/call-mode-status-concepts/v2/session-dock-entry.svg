<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="dock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A2934"/>
      <stop offset="0.45" stop-color="#151B22"/>
      <stop offset="1" stop-color="#10161D"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="#17181D"/>
  <rect x="16" y="40" width="358" height="762" rx="18" fill="#0E1319" stroke="#27313C"/>
  <text x="38" y="78" fill="#D7DEE5" font-family="JetBrains Mono, monospace" font-size="22" font-weight="800">‹</text>
  <text x="70" y="78" fill="#E7EDF2" font-family="JetBrains Mono, monospace" font-size="18" font-weight="800">连续语音开发</text>
  <rect x="310" y="54" width="42" height="34" rx="12" fill="#151B22" stroke="#31404D"/>
  <text x="324" y="76" fill="#A3FF12" font-family="JetBrains Mono, monospace" font-size="15">☎</text>

  <rect x="32" y="108" width="326" height="104" rx="20" fill="url(#dock)" stroke="#31404D"/>
  <path d="M52 160 C65 128 78 192 91 160 C104 128 117 192 130 160 C143 128 156 192 169 160" fill="none" stroke="#A3FF12" stroke-width="4" stroke-linecap="round"/>
  <text x="196" y="144" fill="#E7EDF2" font-family="JetBrains Mono, monospace" font-size="16" font-weight="900">通话正在后台继续</text>
  <text x="196" y="170" fill="#9AA9B8" font-family="JetBrains Mono, monospace" font-size="11">会话页只做 Dock，不抢通话页表达</text>
  <rect x="246" y="184" width="88" height="22" rx="11" fill="#A3FF12"/>
  <text x="266" y="199" fill="#09110A" font-family="JetBrains Mono, monospace" font-size="10" font-weight="900">回到通话</text>

  <rect x="32" y="246" width="242" height="82" rx="12" fill="#0F151B" stroke="#27313C"/>
  <text x="52" y="276" fill="#E7EDF2" font-family="JetBrains Mono, monospace" font-size="13">我建议不要把所有状态塞在会话页。</text>
  <text x="52" y="300" fill="#E7EDF2" font-family="JetBrains Mono, monospace" font-size="13">会话页负责上下文和可操作事项。</text>

  <rect x="92" y="352" width="266" height="108" rx="12" fill="#006CFF"/>
  <text x="114" y="384" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="13" font-weight="800">通话页才是“状态舞台”。</text>
  <text x="114" y="410" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="13">听 / 想 / 说 / 等授权都在那里一眼看到。</text>
  <rect x="114" y="428" width="90" height="20" rx="10" fill="#FFFFFF" opacity="0.16"/>
  <text x="128" y="442" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="9">Design rule</text>

  <rect x="32" y="498" width="326" height="70" rx="14" fill="#291C12" stroke="#A05A1B"/>
  <text x="52" y="527" fill="#FFD9A8" font-family="JetBrains Mono, monospace" font-size="12" font-weight="900">待授权：展示在会话页</text>
  <text x="52" y="550" fill="#E8C9A2" font-family="JetBrains Mono, monospace" font-size="11">因为用户要阅读命令、选择“允许本会话”等操作。</text>

  <rect x="16" y="690" width="358" height="112" fill="#0E1319" stroke="#27313C"/>
  <rect x="32" y="710" width="326" height="42" rx="12" fill="#141B22" stroke="#31404D"/>
  <text x="50" y="736" fill="#748292" font-family="JetBrains Mono, monospace" font-size="12">输入消息...</text>
  <rect x="32" y="764" width="154" height="42" rx="12" fill="#0F151B" stroke="#31404D"/>
  <text x="76" y="790" fill="#D7DEE5" font-family="JetBrains Mono, monospace" font-size="12" font-weight="900">语音输入</text>
  <rect x="204" y="764" width="154" height="42" rx="12" fill="#A3FF12"/>
  <text x="263" y="790" fill="#09110A" font-family="JetBrains Mono, monospace" font-size="12" font-weight="900">发送</text>

  <text x="35" y="828" fill="#7F92A3" font-family="JetBrains Mono, monospace" font-size="10">V2-4 · 会话页 Dock。Flutter: Persistent status banner</text>
