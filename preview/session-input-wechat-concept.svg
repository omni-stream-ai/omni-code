    <text x="252" y="746" fill="#9AA9B8" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16">2. 语音、附件、发送用图标，降低视觉噪音。</text>
    <text x="252" y="778" fill="#9AA9B8" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16">3. 输入框支持 1-4 行自增高，保持轻量。</text>
  </g>

