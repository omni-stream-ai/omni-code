    <text x="252" y="332" fill="#9AA9B8" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16">图标按钮靠边，输入框居中，发送按钮只在有内容时</text>
    <text x="252" y="360" fill="#9AA9B8" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16">高亮，整体更轻、更贴近聊天场景。</text>
  </g>

  <g filter="url(#shadowTight)">
    <rect x="674" y="424" width="440" height="88" rx="18" fill="#66C8FF"/>
