name: omni_code
description: Client console for managing desktop coding agents.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  audioplayers: ^6.4.0
  flutter_tts: ^4.2.2
  path_provider: ^2.1.5
  package_info_plus: ^8.1.1
  record: ^6.1.1
  speech_to_text: ^7.0.0
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  device_info_plus: ^11.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
