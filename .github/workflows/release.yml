name: Release Client

on:
  workflow_dispatch:
  push:
    paths:
      - pubspec.yaml
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  detect-version-bump:
    name: Detect Client Version Bump
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.version.outputs.should_build }}
      should_release: ${{ steps.version.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      stable: ${{ steps.version.outputs.stable }}
      branch_name: ${{ steps.version.outputs.branch_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(awk -F': ' '/^version: /{print $2}' pubspec.yaml | tr -d '[:space:]')"
          current_name="${current_version%%+*}"
          current_code="${current_version##*+}"
          previous_version=""
          previous_name=""
          previous_tag=""
          workflow_changed="false"
          version_changed="false"
          tag_exists="false"
          should_build="false"
          should_release="false"
          prerelease="false"
          stable="false"
          branch_name="${GITHUB_REF_NAME}"
          is_primary_branch="false"
          tag_name="v${current_name}"

          if [[ "$branch_name" == "main" ]]; then
            is_primary_branch="true"
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            if [[ "$before_sha" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${before_sha}:pubspec.yaml" 2>/dev/null; then
              previous_version="$(git show "${before_sha}:pubspec.yaml" | awk -F': ' '/^version: /{print $2}' | tr -d '[:space:]')"
              previous_name="${previous_version%%+*}"
            fi
            if [[ "$before_sha" != "0000000000000000000000000000000000000000" ]]; then
              if ! git diff --quiet "${before_sha}" "${GITHUB_SHA}" -- .github/workflows/release.yml; then
                workflow_changed="true"
              fi
            else
              if git show --pretty='' --name-only "${GITHUB_SHA}" -- .github/workflows/release.yml | grep -q .; then
                workflow_changed="true"
              fi
            fi

            if [[ -n "$current_name" && "$current_name" != "$previous_name" ]]; then
              version_changed="true"
            fi

            if [[ "$version_changed" == "true" || "$workflow_changed" == "true" ]]; then
              git fetch --tags --force
              previous_tag="$(git tag --sort=-version:refname | grep -Fxv "${tag_name}" | head -n1 || true)"
              if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
                tag_exists="true"
              fi
            fi

            if [[ "$version_changed" == "true" ]]; then
              should_build="true"
              should_release="true"

              if [[ "$current_name" == *-* ]]; then
                prerelease="true"
              else
                stable="true"
              fi

              if [[ "$is_primary_branch" == "true" && "$prerelease" == "true" ]]; then
                echo "${branch_name} cannot publish prerelease versions: ${current_name}" >&2
                exit 1
              fi

              if [[ "$is_primary_branch" != "true" && "$stable" == "true" ]]; then
                echo "${branch_name} must use a prerelease version suffix (for example 0.1.0-beta.1): ${current_name}" >&2
                exit 1
              fi

              if [[ "$tag_exists" == "true" ]]; then
                tagged_commit="$(git rev-list -n 1 "${tag_name}")"
                if [[ "$tagged_commit" != "${GITHUB_SHA}" ]]; then
                  echo "Tag ${tag_name} already exists on ${tagged_commit}, expected ${GITHUB_SHA}." >&2
                  exit 1
                fi
              fi
            elif [[ "$workflow_changed" == "true" ]]; then
              should_build="true"
              if [[ "$tag_exists" != "true" ]]; then
                should_release="true"

                if [[ "$current_name" == *-* ]]; then
                  prerelease="true"
                else
                  stable="true"
                fi

                if [[ "$is_primary_branch" == "true" && "$prerelease" == "true" ]]; then
                  echo "${branch_name} cannot publish prerelease versions: ${current_name}" >&2
                  exit 1
                fi

                if [[ "$is_primary_branch" != "true" && "$stable" == "true" ]]; then
                  echo "${branch_name} must use a prerelease version suffix (for example 0.1.0-beta.1): ${current_name}" >&2
                  exit 1
                fi
              fi
            fi
          else
            should_build="true"
            should_release="false"
            git fetch --tags --force
            previous_tag="$(git tag --sort=-version:refname | grep -Fxv "${tag_name}" | head -n1 || true)"
          fi

          {
            echo "branch_name=${branch_name}"
            echo "version_name=${current_name}"
            echo "version_code=${current_code}"
            echo "previous_name=${previous_name}"
            echo "tag=${tag_name}"
            echo "previous_tag=${previous_tag}"
            echo "should_build=${should_build}"
            echo "should_release=${should_release}"
            echo "prerelease=${prerelease}"
            echo "stable=${stable}"
          } >> "$GITHUB_OUTPUT"

  android-apk:
    name: Android Client APK
    runs-on: ubuntu-latest
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.should_build == 'true'
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Android release signing files
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' && env.ANDROID_STORE_PASSWORD != '' }}
        shell: bash
        run: |
          decode_base64_secret() {
            local input="$1"
            local output_path="$2"
            local normalized

            normalized="$(printf '%s' "$input" | tr -d '\r\n\t ' )"
            normalized="${normalized#base64,}"
            normalized="${normalized#data:application/octet-stream;base64,}"
            normalized="${normalized#data:application/x-java-keystore;base64,}"
            normalized="${normalized#data:application/json;base64,}"
            normalized="${normalized#\"}"
            normalized="${normalized%\"}"
            normalized="${normalized//-/+}"
            normalized="${normalized//_/\/}"

            if ! printf '%s' "$normalized" | base64 --decode > "$output_path"; then
              echo "Failed to decode base64 secret. Make sure the GitHub secret contains raw base64 only, not a file path or malformed data URL." >&2
              exit 1
            fi
          }

          decode_base64_secret "$ANDROID_KEYSTORE_BASE64" android/app/release-keystore.jks
          if [[ ! -s android/app/release-keystore.jks ]]; then
            echo "Decoded Android keystore is empty." >&2
            exit 1
          fi
          if ! keytool -list -keystore android/app/release-keystore.jks -storepass "$ANDROID_STORE_PASSWORD" >/dev/null 2>&1; then
            echo "Decoded keystore file is unreadable. Recreate ANDROID_KEYSTORE_BASE64 from the binary keystore and verify ANDROID_STORE_PASSWORD." >&2
            exit 1
          fi
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          storePassword=${ANDROID_STORE_PASSWORD}
          EOF

      - name: Restore Firebase config
        if: ${{ env.ANDROID_GOOGLE_SERVICES_JSON_BASE64 != '' }}
        shell: bash
        run: |
          decode_base64_secret() {
            local input="$1"
            local output_path="$2"
            local normalized

            normalized="$(printf '%s' "$input" | tr -d '\r\n\t ' )"
            normalized="${normalized#base64,}"
            normalized="${normalized#data:application/octet-stream;base64,}"
            normalized="${normalized#data:application/x-java-keystore;base64,}"
            normalized="${normalized#data:application/json;base64,}"
            normalized="${normalized#\"}"
            normalized="${normalized%\"}"
            normalized="${normalized//-/+}"
            normalized="${normalized//_/\/}"

            if ! printf '%s' "$normalized" | base64 --decode > "$output_path"; then
              echo "Failed to decode base64 secret. Make sure the GitHub secret contains raw base64 only, not a file path or malformed data URL." >&2
              exit 1
            fi
          }

          decode_base64_secret "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build split-per-abi APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: omni-code-android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload split-per-abi APKs
        uses: actions/upload-artifact@v4
        with:
          name: omni-code-android-split-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error

  desktop-bundles:
    name: Desktop Bundle (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            asset_name: omni-code-windows-x86_64
            archive_name: omni-code-windows-x86_64.zip
          - os: ubuntu-latest
            label: Linux
            asset_name: omni-code-linux-x86_64
            archive_name: omni-code-linux-x86_64.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -q
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows desktop bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: flutter build windows --release

      - name: Build Linux desktop bundle
        if: runner.os == 'Linux'
        shell: bash
        run: flutter build linux --release

      - name: Package Windows desktop bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item "build/windows/x64/runner/Release" "dist/${{ matrix.asset_name }}" -Recurse
          Compress-Archive -Path "dist/${{ matrix.asset_name }}" -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Package Linux desktop bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -R build/linux/x64/release/bundle "dist/${{ matrix.asset_name }}"
          tar -C dist -czf "dist/${{ matrix.archive_name }}" "${{ matrix.asset_name }}"

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  publish-release:
    name: Publish Client Release
    runs-on: ubuntu-latest
    needs:
      - detect-version-bump
      - android-apk
      - desktop-bundles
    if: needs.detect-version-bump.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          TAG: ${{ needs.detect-version-bump.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${TAG}")"
            if [[ "$tagged_commit" != "${GITHUB_SHA}" ]]; then
              echo "Tag ${TAG} already exists on ${tagged_commit}, expected ${GITHUB_SHA}." >&2
              exit 1
            fi
            echo "Tag ${TAG} already exists on the current commit."
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: omni-code-*
          path: release-assets
          merge-multiple: true

      - name: Normalize Android release asset name
        shell: bash
        run: |
          set -euo pipefail

          universal_apk_path="$(find release-assets -name 'app-release.apk' -print -quit)"
          if [[ -z "$universal_apk_path" ]]; then
            echo "Release APK not found." >&2
            exit 1
          fi
          cp "$universal_apk_path" release-assets/omni-code-android.apk

          armv7_apk_path="$(find release-assets -name 'app-armeabi-v7a-release.apk' -print -quit)"
          arm64_apk_path="$(find release-assets -name 'app-arm64-v8a-release.apk' -print -quit)"
          x64_apk_path="$(find release-assets -name 'app-x86_64-release.apk' -print -quit)"

          if [[ -n "$armv7_apk_path" ]]; then
            cp "$armv7_apk_path" release-assets/omni-code-android-armeabi-v7a.apk
          fi
          if [[ -n "$arm64_apk_path" ]]; then
            cp "$arm64_apk_path" release-assets/omni-code-android-arm64-v8a.apk
          fi
          if [[ -n "$x64_apk_path" ]]; then
            cp "$x64_apk_path" release-assets/omni-code-android-x86_64.apk
          fi

      - name: Generate update manifest
        env:
          TAG: ${{ needs.detect-version-bump.outputs.tag }}
          VERSION_NAME: ${{ needs.detect-version-bump.outputs.version_name }}
          VERSION_CODE: ${{ needs.detect-version-bump.outputs.version_code }}
        shell: bash
        run: |
          set -euo pipefail

          cat > release-assets/update.json <<EOF
          {
            "version_name": "${VERSION_NAME}",
            "version_code": ${VERSION_CODE},
            "apk_url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/omni-code-android.apk",
            "apk_urls": {
              "armeabi-v7a": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/omni-code-android-armeabi-v7a.apk",
              "arm64-v8a": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/omni-code-android-arm64-v8a.apk",
              "x86_64": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/omni-code-android-x86_64.apk"
            },
            "release_notes": "GitHub release ${TAG}",
            "force": false
          }
          EOF

      - name: Build release notes
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: .github/release-changelog-config.json
          mode: COMMIT
          toTag: ${{ needs.detect-version-bump.outputs.tag }}
          fromTag: ${{ needs.detect-version-bump.outputs.previous_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version-bump.outputs.tag }}
          name: ${{ needs.detect-version-bump.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ needs.detect-version-bump.outputs.prerelease }}
          files: |
            release-assets/omni-code-android.apk
            release-assets/omni-code-android-armeabi-v7a.apk
            release-assets/omni-code-android-arm64-v8a.apk
            release-assets/omni-code-android-x86_64.apk
            release-assets/omni-code-windows-x86_64.zip
            release-assets/omni-code-linux-x86_64.tar.gz
            release-assets/update.json
